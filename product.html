 
<!DOCTYPE html>
<html>

<head>

<title>Product</title>

<link rel="stylesheet" href="style.css">

</head>

<body>

<nav>
<a href="index.html">HOME</a>
<a href="women.html">WOMEN</a>
<a href="men.html">MEN</a>
<a href="kids.html">KIDS</a>
<a href="beauty.html">BEAUTY</a>
</nav>

<section class="product-details">

<div class="product-image">

<img id="productImage">

</div>

<div class="product-info">

<h1 id="productName"></h1>

<h2 id="productPrice"></h2>

<p>
Premium Collection • 100% Original
</p>

<a id="orderLink">
  ORDER NOW
</a>

</div>

</section>

<script>

const url = new URLSearchParams(window.location.search);

const name = url.get("name") || "Product Name";
const price = url.get("price") || "Price";
const image = url.get("image") || "";

document.getElementById("productName").innerText = name;
document.getElementById("productPrice").innerText = price;

if (image) {
  document.getElementById("productImage").src = image;
}

document.getElementById("orderLink").href =
`https://wa.me/923358053443?text=Hi I want to order ${name}`;

</script>

</body>

</html>
